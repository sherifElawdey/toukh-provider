name: toukh_provider
description: "Toukh Service app for shops and home service providers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  toukh_ui:
    path: ../packages/toukh_ui

  cupertino_icons: ^1.0.8
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  intl: ^0.20.2
  get_it: ^8.0.3
  go_router: ^14.6.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  geocoding: ^3.0.0
  crypto: ^3.0.6
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.5
  get: ^4.7.3
  http: ^1.2.2
  package_info_plus: ^8.3.0
  uuid: ^4.5.1
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher / store icon: full-bleed gradient artwork.
# In-app mark (welcome, auth, etc.): assets/branding/app_icon_provider.png
flutter_launcher_icons:
  image_path: assets/branding/app_launcher_icon.png
  android: true
  ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0a1628"
  adaptive_icon_foreground: assets/branding/app_launcher_icon.png
  web:
    generate: true
    image_path: assets/branding/app_launcher_icon.png
    background_color: "#0a1628"
    theme_color: "#0284c7"

flutter:
  uses-material-design: true

  assets:
    - assets/branding/app_icon_provider.png
    - assets/branding/app_text.png
    - assets/branding/
    - assets/icons/
    - assets/l10n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/cairo/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/cairo/Cairo-Black.ttf
          weight: 900
        - asset: assets/fonts/cairo/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/cairo/Cairo-ExtraLight.ttf
          weight: 200
